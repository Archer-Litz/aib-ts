```html
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Impostor - por Daniel Ruas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #111827; /* cinza muito escuro */
            color: #f3f4f6;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .cyber-border {
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        
        .impostor-border {
            border: 1px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center">

    <main id="app" class="w-full max-w-sm mx-auto p-5 fade-in">
        <!-- Conteúdo gerado via JS -->
    </main>

    <script>
        // --- ESTADO DO JOGO ---
        let state = {
            mestre: "",
            palavraSecreta: "",
            jogadores: [],
            dadosJogo: [], // Array com { nome, isImpostor }
            jogadorAtualIndex: 0,
            ecra: 'mestre' // 'mestre', 'setup_jogadores', 'passar', 'revelar', 'jogo', 'fim'
        };

        const appElement = document.getElementById('app');

        // --- FUNÇÕES DE RENDERIZAÇÃO ---
        function render() {
            appElement.innerHTML = '';
            appElement.className = "w-full max-w-sm mx-auto p-5 fade-in"; 

            switch (state.ecra) {
                case 'mestre': renderMestreScreen(); break;
                case 'setup_jogadores': renderSetupJogadoresScreen(); break;
                case 'passar': renderPassarScreen(); break;
                case 'revelar': renderRevelarScreen(); break;
                case 'jogo': renderJogoScreen(); break;
                case 'fim': renderFimScreen(); break;
            }
        }

        // ECRA 1: DEFINIR MESTRE E PALAVRA
        function renderMestreScreen() {
            appElement.innerHTML = `
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-1">IMPOSTOR</h1>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-semibold">por Daniel Ruas</p>
                </div>
                
                <div class="bg-gray-800/50 p-6 rounded-2xl cyber-border backdrop-blur-sm mb-6">
                    <h2 class="text-lg font-semibold mb-4 text-blue-300">A vez do Mestre</h2>
                    <p class="text-sm text-gray-400 mb-5">O Mestre escolhe a palavra e gere o jogo, não participa nas respostas.</p>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1 ml-1">Nome do Mestre</label>
                            <input type="text" id="mestreName" placeholder="Ex: João..." 
                                class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1 ml-1">Palavra Secreta</label>
                            <input type="password" id="palavraInput" placeholder="Digite a palavra sem ninguém ver..." 
                                class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-colors">
                            <div class="flex items-center mt-2 ml-1">
                                <input type="checkbox" id="showWord" class="mr-2 accent-emerald-500" onchange="togglePassword()">
                                <label for="showWord" class="text-xs text-gray-400">Mostrar palavra</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button onclick="salvarMestre()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all active:scale-95 text-lg">
                    Continuar
                </button>
            `;
        }

        // ECRA 2: ADICIONAR JOGADORES
        function renderSetupJogadoresScreen() {
            let html = `
                <div class="text-center mb-6">
                    <p class="text-sm text-gray-400">Mestre: <span class="font-bold text-blue-400">${state.mestre}</span></p>
                    <h2 class="text-2xl font-bold mt-2">Adicionar Jogadores</h2>
                </div>
                
                <div class="bg-gray-800/50 p-5 rounded-2xl cyber-border mb-6">
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="playerName" placeholder="Nome do jogador..." 
                            class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors"
                            onkeypress="if(event.key === 'Enter') addPlayer()">
                        <button onclick="addPlayer()" class="bg-blue-600 hover:bg-blue-500 px-5 py-3 rounded-xl font-bold text-xl transition-colors">
                            +
                        </button>
                    </div>
                    
                    <ul id="playersList" class="space-y-2 max-h-56 overflow-y-auto pr-1">
            `;

            if (state.jogadores.length === 0) {
                html += `<li class="text-gray-500 text-sm text-center py-4">Adicione pelo menos 3 jogadores.</li>`;
            } else {
                state.jogadores.forEach((player, index) => {
                    html += `
                        <li class="flex justify-between items-center bg-gray-700/50 px-4 py-3 rounded-xl border border-gray-600/50">
                            <span class="font-medium">${player}</span>
                            <button onclick="removePlayer(${index})" class="text-red-400 hover:text-red-300 font-bold p-1 text-lg leading-none">&times;</button>
                        </li>
                    `;
                });
            }

            html += `
                    </ul>
                </div>
                
                <button onclick="iniciarSorteio()" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all active:scale-95 text-lg flex justify-center items-center gap-2">
                    Distribuir Palavras
                </button>
                <button onclick="state.ecra='mestre'; render();" class="w-full mt-3 text-gray-500 text-sm py-2 underline hover:text-gray-300">
                    Voltar para o Mestre
                </button>
            `;
            appElement.innerHTML = html;
        }

        // ECRA 3: PASSAR TELEMÓVEL
        function renderPassarScreen() {
            const nomeAtual = state.dadosJogo[state.jogadorAtualIndex].nome;

            appElement.innerHTML = `
                <div class="text-center bg-gray-800/80 p-8 rounded-3xl cyber-border mt-10">
                    <div class="text-6xl mb-6 animate-bounce">📱</div>
                    <h2 class="text-xl font-medium mb-1 text-gray-400">Passe o telemóvel para</h2>
                    <h1 class="text-4xl font-black text-white mb-8 tracking-wide">${nomeAtual}</h1>
                    
                    <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700 mb-8">
                        <p class="text-amber-400/80 text-sm font-medium">⚠️ Certifique-se de que ninguém está a olhar para o seu ecrã!</p>
                    </div>
                    
                    <button onclick="state.ecra='revelar'; render();" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg">
                        Mostrar minha palavra
                    </button>
                </div>
            `;
        }

        // ECRA 4: REVELAR
        function renderRevelarScreen() {
            const jogadorData = state.dadosJogo[state.jogadorAtualIndex];
            
            let htmlConteudo = '';
            
            if (jogadorData.isImpostor) {
                htmlConteudo = `
                    <div class="text-center bg-red-950/40 p-8 rounded-3xl impostor-border mt-10">
                        <div class="text-6xl mb-4">🤫</div>
                        <h2 class="text-xl text-red-300/80 font-medium tracking-widest uppercase mb-2">Você é o</h2>
                        <h1 class="text-4xl font-black text-red-500 mb-6 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]">IMPOSTOR</h1>
                        <p class="text-gray-300 text-sm leading-relaxed">Não deixe que descubram. Preste atenção nas palavras dos outros para tentar adivinhar a palavra secreta!</p>
                    </div>
                `;
            } else {
                htmlConteudo = `
                    <div class="text-center bg-blue-950/40 p-8 rounded-3xl cyber-border mt-10">
                        <div class="text-sm text-blue-300/80 uppercase tracking-widest mb-2 font-medium">A Palavra Secreta é</div>
                        <h1 class="text-4xl font-black text-white mb-8 tracking-wider bg-gray-900 py-4 rounded-xl border border-blue-500/30 shadow-inner">${state.palavraSecreta}</h1>
                        <p class="text-gray-300 text-sm">Memorize a palavra. Tente descobrir quem é o impostor fazendo perguntas aos outros.</p>
                    </div>
                `;
            }

            appElement.innerHTML = `
                ${htmlConteudo}
                <div class="mt-8">
                    <button onclick="proximoTurno()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg">
                        Esconder e Continuar
                    </button>
                </div>
            `;
        }

        // ECRA 5: MESTRE CONTROLA O JOGO
        function renderJogoScreen() {
            appElement.innerHTML = `
                <div class="text-center mb-8">
                    <h2 class="text-sm text-gray-400 uppercase tracking-widest mb-1">Em Andamento</h2>
                    <h1 class="text-2xl font-bold text-blue-400">Descubram o Impostor!</h1>
                </div>

                <div class="bg-gray-800/50 p-6 rounded-3xl cyber-border text-center mb-8">
                    <p class="text-gray-400 mb-2 text-sm">O Mestre (<span class="text-white font-medium">${state.mestre}</span>) controla esta fase.</p>
                    <div class="my-6">
                        <p class="text-xs text-gray-500 mb-1">Palavra desta rodada:</p>
                        <button onclick="alert('Palavra Secreta: ${state.palavraSecreta}')" class="text-emerald-400 border border-emerald-500/30 bg-emerald-500/10 px-4 py-2 rounded-lg text-sm hover:bg-emerald-500/20 transition">
                            👁️ Lembrar Mestre da Palavra
                        </button>
                    </div>
                    <p class="text-sm text-gray-300">Façam perguntas à vez. Quando o grupo decidir quem é o impostor, o Mestre encerra o jogo.</p>
                </div>

                <button onclick="state.ecra='fim'; render();" class="w-full bg-red-600/90 hover:bg-red-500 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.4)] transition-all active:scale-95 text-lg">
                    Encerrar e Revelar Todos
                </button>
            `;
        }

        // ECRA 6: FIM
        function renderFimScreen() {
            const impostores = state.dadosJogo.filter(j => j.isImpostor).map(j => j.nome).join(' e ');

            appElement.innerHTML = `
                <div class="text-center bg-gray-800/80 p-8 rounded-3xl border border-gray-700 mt-6 relative overflow-hidden">
                    <div class="absolute inset-0 bg-red-500/5"></div>
                    <div class="relative z-10">
                        <h2 class="text-lg text-gray-400 mb-2 uppercase tracking-widest font-semibold">Os Impostores eram</h2>
                        <h1 class="text-3xl font-black text-red-500 mb-6 drop-shadow-md">${impostores}</h1>
                        
                        <div class="w-16 h-px bg-gray-600 mx-auto my-6"></div>
                        
                        <h2 class="text-sm text-gray-400 mb-2">A Palavra era</h2>
                        <h3 class="text-2xl font-bold text-white bg-gray-900 inline-block px-6 py-2 rounded-xl border border-gray-700">${state.palavraSecreta}</h3>
                    </div>
                </div>
                
                <div class="mt-8 space-y-3">
                    <button onclick="resetarRodada()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        Nova Palavra (Mesmo Mestre/Jogadores)
                    </button>
                    <button onclick="resetTotal()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95 text-sm">
                        Mudar Tudo (Novo Mestre)
                    </button>
                </div>
            `;
        }

        // --- LÓGICA DO JOGO ---

        function togglePassword() {
            const input = document.getElementById('palavraInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function salvarMestre() {
            const mestreInput = document.getElementById('mestreName').value.trim();
            const palavraInput = document.getElementById('palavraInput').value.trim();

            if (!mestreInput) {
                alert("O Mestre precisa de um nome!");
                return;
            }
            if (!palavraInput) {
                alert("Precisas de escrever uma Palavra Secreta!");
                return;
            }

            state.mestre = mestreInput;
            state.palavraSecreta = palavraInput.toUpperCase();
            state.ecra = 'setup_jogadores';
            render();
        }

        function addPlayer() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();
            if (name && !state.jogadores.includes(name) && name.toLowerCase() !== state.mestre.toLowerCase()) {
                state.jogadores.push(name);
                input.value = '';
                render();
            } else if (name.toLowerCase() === state.mestre.toLowerCase()) {
                alert("O Mestre não pode ser um jogador nesta rodada!");
            }
        }

        function removePlayer(index) {
            state.jogadores.splice(index, 1);
            render();
        }

        function iniciarSorteio() {
            if (state.jogadores.length < 3) {
                alert("É preciso pelo menos 3 jogadores (além do Mestre)!");
                return;
            }

            // Decidir quantidade de impostores: 1 (sempre) ou 2 (50% de probabilidade se houver 5+ jogadores)
            let qtImpostores = 1;
            if (state.jogadores.length >= 5 && Math.random() > 0.5) {
                qtImpostores = 2;
            }

            // Sorteio
            let indicesImpostores = [];
            while(indicesImpostores.length < qtImpostores) {
                let randomIdx = Math.floor(Math.random() * state.jogadores.length);
                if(!indicesImpostores.includes(randomIdx)){
                    indicesImpostores.push(randomIdx);
                }
            }

            state.dadosJogo = state.jogadores.map((nome, index) => {
                return {
                    nome: nome,
                    isImpostor: indicesImpostores.includes(index)
                };
            });

            state.jogadorAtualIndex = 0;
            state.ecra = 'passar';
            render();
        }

        function proximoTurno() {
            state.jogadorAtualIndex++;
            if (state.jogadorAtualIndex >= state.dadosJogo.length) {
                // Todos viram
                state.ecra = 'jogo';
            } else {
                state.ecra = 'passar';
            }
            render();
        }

        function resetarRodada() {
            state.palavraSecreta = "";
            state.ecra = 'mestre'; // Volta a pedir palavra
            render();
        }

        function resetTotal() {
            state = {
                mestre: "",
                palavraSecreta: "",
                jogadores: [],
                dadosJogo: [],
                jogadorAtualIndex: 0,
                ecra: 'mestre'
            };
            render();
        }

        // Init
        render();
    </script>
</body>
</html>


```
