```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande Biblioteca - Conhecimento Ancestral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Biblioteca para gerar o Print/Imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --parchment: #fde68a;
            --parchment-dark: #d97706;
        }

        body {
            font-family: 'Lora', serif;
        }

        h1, h2, h3, .font-title {
            font-family: 'Cinzel', serif;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1c1917; }
        ::-webkit-scrollbar-thumb { background: #57534e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #78716c; }
        
        .bg-library {
            background-color: #1c1917;
            background-image: radial-gradient(circle at center, #292524 0%, #1c1917 100%);
        }

        .bg-scroll {
            background-color: #fdf6e3;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            color: #3f2c1c;
            box-shadow: inset 0 0 50px rgba(139, 69, 19, 0.2);
            border: 2px solid #b8860b;
        }

        .filter-btn.active {
            background-color: #b45309; 
            color: white;
            border-color: #fbbf24; 
        }
    </style>
</head>
<body class="bg-stone-900 text-stone-200 min-h-screen flex flex-col bg-library">

    <!-- Navegação / Cabeçalho -->
    <nav class="bg-stone-950/80 backdrop-blur border-b border-amber-900/50 p-4 sticky top-0 z-40 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i data-lucide="library" class="text-amber-500 w-8 h-8"></i>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-amber-500 tracking-widest uppercase">Arquivos de Iwagakure</h1>
                    <p class="text-xs text-stone-400 font-sans tracking-wide">Enciclopédia de Técnicas e Energias</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openModal('addModal')" class="bg-stone-800 hover:bg-amber-900/80 text-amber-200 px-4 py-2 rounded flex items-center gap-2 border border-amber-900 transition-colors font-sans text-sm">
                    <i data-lucide="feather" class="w-4 h-4"></i> <span class="hidden sm:inline">Novo Registro</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Sidebar de Filtros -->
        <aside class="w-full lg:w-1/4 flex flex-col gap-6">
            
            <!-- Busca -->
            <div class="bg-stone-800/50 border border-stone-700 p-4 rounded-lg shadow-lg">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-3 w-5 h-5 text-stone-400"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar..." class="w-full bg-stone-900 border border-stone-600 rounded py-2 pl-10 pr-3 text-white focus:border-amber-500 outline-none font-sans transition-colors">
                </div>
            </div>

            <!-- Categorias -->
            <div class="bg-stone-800/50 border border-stone-700 p-4 rounded-lg shadow-lg flex flex-col gap-2">
                <h3 class="text-amber-500 font-bold mb-2 flex items-center gap-2 border-b border-stone-700 pb-2"><i data-lucide="layers" class="w-5 h-5"></i> Filtros</h3>
                
                <button class="filter-btn active w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="all">
                    <span class="text-xl">📚</span> Tudo
                </button>
                <button class="filter-btn w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="jutsu">
                    <span class="text-xl">🥷</span> Jutsus
                </button>
                <button class="filter-btn w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="chakra">
                    <span class="text-xl">🌀</span> Chakra
                </button>
                <button class="filter-btn w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="dobra">
                    <span class="text-xl">🌊</span> Dobras/Poderes
                </button>
                <button class="filter-btn w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="luta">
                    <span class="text-xl">🥋</span> Estilos de Luta
                </button>
                <button class="filter-btn w-full text-left px-4 py-2 rounded border border-transparent hover:bg-stone-700 transition-colors flex items-center gap-3" data-filter="energia">
                    <span class="text-xl">⚡</span> Energias
                </button>
            </div>
        </aside>

        <!-- Área de Grade -->
        <section class="w-full lg:w-3/4">
            <div id="library-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- Cards renderizados via JS -->
            </div>
            
            <div id="empty-state" class="flex flex-col items-center justify-center h-64 text-stone-500">
                <i data-lucide="book-dashed" class="w-16 h-16 mb-4 opacity-50"></i>
                <p class="font-sans">A biblioteca está vazia. Adicione o primeiro conhecimento.</p>
            </div>
        </section>

    </main>

    <!-- ================= MODAIS ================= -->

    <!-- Fundo Escuro -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/80 z-50 hidden backdrop-blur-sm items-center justify-center p-4 overflow-y-auto">
        
        <!-- Modal Adicionar (Simplificado) -->
        <div id="addModal" class="bg-stone-900 border border-amber-800 rounded-lg shadow-[0_0_40px_rgba(180,83,9,0.3)] w-full max-w-xl hidden flex-col my-8">
            <div class="p-4 border-b border-amber-900/50 flex justify-between items-center bg-stone-950 rounded-t-lg">
                <h3 class="text-xl font-bold text-amber-500 font-title tracking-wider flex items-center gap-2"><i data-lucide="pen-tool"></i> Registrar Poder</h3>
                <button onclick="closeModals()" class="text-stone-400 hover:text-white transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4 font-sans text-sm">
                
                <div>
                    <label class="block text-amber-500/80 mb-1">Nome do Poder/Técnica <span class="text-red-500">*</span></label>
                    <input type="text" id="entry-title" placeholder="Ex: Bola de Fogo" class="w-full bg-stone-800 border border-stone-600 rounded p-3 text-white focus:border-amber-500 outline-none text-lg">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-amber-500/80 mb-1">Categoria <span class="text-red-500">*</span></label>
                        <select id="entry-category" class="w-full bg-stone-800 border border-stone-600 rounded p-2 text-white focus:border-amber-500 outline-none">
                            <option value="jutsu">🥷 Jutsu / Técnica</option>
                            <option value="chakra">🌀 Natureza de Chakra</option>
                            <option value="dobra">🌊 Dobra / Poder Singular</option>
                            <option value="luta">🥋 Estilo de Luta</option>
                            <option value="energia">⚡ Energia Externa</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-amber-500/80 mb-1">Detalhe (Opcional)</label>
                        <input type="text" id="entry-detail" placeholder="Ex: Rank B, Passiva, Fogo..." class="w-full bg-stone-800 border border-stone-600 rounded p-2 text-white focus:border-amber-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-amber-500/80 mb-1">Descrição Completa <span class="text-red-500">*</span></label>
                    <textarea id="entry-desc" rows="5" placeholder="Escreva aqui tudo sobre o poder: o que faz, como funciona, requisitos, custos..." class="w-full bg-stone-800 border border-stone-600 rounded p-3 text-white focus:border-amber-500 outline-none resize-none"></textarea>
                </div>

            </div>
            <div class="p-4 border-t border-amber-900/50 flex justify-end gap-3 bg-stone-950 rounded-b-lg">
                <button onclick="closeModals()" class="px-4 py-2 bg-stone-800 hover:bg-stone-700 rounded text-stone-300 transition-colors font-sans">Cancelar</button>
                <button onclick="saveEntry()" class="px-6 py-2 bg-amber-700 hover:bg-amber-600 rounded text-white font-bold transition-colors shadow-lg font-sans flex items-center gap-2">
                    <i data-lucide="check"></i> Salvar
                </button>
            </div>
        </div>

        <!-- Modal Visualizar (O Pergaminho Aberto) -->
        <div id="viewModal" class="w-full max-w-2xl hidden flex-col my-8 relative">
            
            <!-- Botões de Controle Externos -->
            <div class="flex justify-end gap-2 mb-2 font-sans">
                <button onclick="takeScrollPrint()" class="bg-emerald-700 hover:bg-emerald-600 text-white px-3 py-1 rounded-t flex items-center gap-1 text-sm shadow-lg transition-colors border border-emerald-900 border-b-0">
                    <i data-lucide="camera" class="w-4 h-4"></i> Gerar Imagem
                </button>
                <button onclick="closeModals()" class="bg-red-900 hover:bg-red-800 text-white px-3 py-1 rounded-t flex items-center gap-1 text-sm shadow-lg transition-colors border border-red-950 border-b-0">
                    <i data-lucide="x" class="w-4 h-4"></i> Fechar
                </button>
            </div>

            <!-- Área do Pergaminho (Print) -->
            <div id="scroll-capture" class="bg-scroll p-8 md:p-12 rounded-sm relative">
                <!-- Madeira do pergaminho -->
                <div class="absolute top-0 left-[-10px] right-[-10px] h-4 bg-[#5c4033] rounded-full shadow-md"></div>
                <div class="absolute bottom-0 left-[-10px] right-[-10px] h-4 bg-[#5c4033] rounded-full shadow-md"></div>

                <div class="flex items-start gap-4 mb-6 border-b-2 border-[#b8860b]/30 pb-4">
                    <span id="v-icon" class="text-5xl drop-shadow-sm mt-1">🥷</span>
                    <div>
                        <h2 id="v-title" class="text-3xl font-bold text-[#3f2c1c] font-title uppercase tracking-wider">Nome</h2>
                        <div class="flex items-center gap-3 text-sm text-[#5c4033] font-sans font-bold mt-1">
                            <span id="v-category" class="bg-[#b8860b]/20 px-2 py-0.5 rounded border border-[#b8860b]/30">Categoria</span>
                            <span id="v-detail" class="hidden border-l-2 border-[#b8860b]/30 pl-3 italic">Detalhe</span>
                        </div>
                    </div>
                </div>

                <div class="text-[#3f2c1c] text-lg leading-relaxed font-sans">
                    <p id="v-desc" class="whitespace-pre-wrap"></p>
                </div>
            </div>
        </div>

    </div>

    <!-- NOTIFICAÇÃO -->
    <div id="toast" class="fixed bottom-4 right-4 bg-amber-700 text-white px-4 py-3 rounded shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 font-sans">
        <i data-lucide="check-circle"></i> <span id="toastMsg">Salvo!</span>
    </div>

    <script>
        const categoryConfig = {
            'jutsu': { icon: '🥷', label: 'Técnica' },
            'chakra': { icon: '🌀', label: 'Chakra' },
            'dobra': { icon: '🌊', label: 'Poder/Dobra' },
            'luta': { icon: '🥋', label: 'Estilo de Luta' },
            'energia': { icon: '⚡', label: 'Energia' }
        };

        // Começa totalmente vazio
        let LIBRARY_DATA = [];

        let currentFilter = 'all';
        let currentSearch = '';

        lucide.createIcons();
        renderLibrary();

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentFilter = e.currentTarget.dataset.filter;
                renderLibrary();
            });
        });

        // Busca
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderLibrary();
        });

        function renderLibrary() {
            const grid = document.getElementById('library-grid');
            const emptyState = document.getElementById('empty-state');
            
            let filtered = LIBRARY_DATA.filter(item => {
                const matchFilter = currentFilter === 'all' || item.category === currentFilter;
                const matchSearch = item.title.toLowerCase().includes(currentSearch) || 
                                    item.desc.toLowerCase().includes(currentSearch);
                return matchFilter && matchSearch;
            });

            grid.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                filtered.forEach(item => {
                    const conf = categoryConfig[item.category];
                    
                    const card = document.createElement('div');
                    card.className = 'bg-stone-800 border border-stone-600 hover:border-amber-500 rounded-lg p-5 cursor-pointer transition-all hover:shadow-[0_0_15px_rgba(217,119,6,0.15)] relative group';
                    card.onclick = () => openViewModal(item.id);
                    
                    card.innerHTML = `
                        <div class="flex items-start gap-4">
                            <div class="text-3xl bg-stone-900 border border-stone-700 w-12 h-12 flex items-center justify-center rounded shadow-inner">
                                ${conf.icon}
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs text-amber-500 font-bold uppercase tracking-wider mb-1">${conf.label} ${item.detail ? `• ${item.detail}` : ''}</p>
                                <h3 class="text-lg font-bold text-stone-200 font-title truncate mb-2">${item.title}</h3>
                                <p class="text-sm text-stone-400 line-clamp-2 font-sans">${item.desc}</p>
                            </div>
                        </div>
                        
                        <button onclick="event.stopPropagation(); deleteEntry(${item.id})" class="absolute top-2 right-2 text-stone-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity bg-stone-900 rounded p-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            }
        }

        const overlay = document.getElementById('modalOverlay');

        function openModal(id) {
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('viewModal').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }

        function closeModals() {
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            document.getElementById('entry-title').value = '';
            document.getElementById('entry-detail').value = '';
            document.getElementById('entry-desc').value = '';
        }

        function saveEntry() {
            const title = document.getElementById('entry-title').value.trim();
            const category = document.getElementById('entry-category').value;
            const detail = document.getElementById('entry-detail').value.trim();
            const desc = document.getElementById('entry-desc').value.trim();

            if (!title || !desc) {
                alert('Nome e Descrição são obrigatórios!');
                return;
            }

            const newEntry = {
                id: Date.now(),
                title, category, detail, desc
            };

            LIBRARY_DATA.unshift(newEntry);
            renderLibrary();
            closeModals();
            showToast('Salvo com sucesso!');
        }

        function deleteEntry(id) {
            if (confirm("Apagar este registro?")) {
                LIBRARY_DATA = LIBRARY_DATA.filter(item => item.id !== id);
                renderLibrary();
            }
        }

        function openViewModal(id) {
            const item = LIBRARY_DATA.find(i => i.id === id);
            if (!item) return;

            const conf = categoryConfig[item.category];

            document.getElementById('v-icon').innerText = conf.icon;
            document.getElementById('v-title').innerText = item.title;
            document.getElementById('v-category').innerText = conf.label;
            
            const detailEl = document.getElementById('v-detail');
            if (item.detail) {
                detailEl.innerText = item.detail;
                detailEl.classList.remove('hidden');
            } else {
                detailEl.classList.add('hidden');
            }

            document.getElementById('v-desc').innerText = item.desc;
            
            openModal('viewModal');
        }

        function takeScrollPrint() {
            const captureArea = document.getElementById('scroll-capture');
            const title = document.getElementById('v-title').innerText.replace(/[^a-z0-9]/gi, '_').toLowerCase();

            showToast('Gerando imagem...', false);

            setTimeout(() => {
                html2canvas(captureArea, {
                    backgroundColor: "#1c1917", 
                    scale: 2, 
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Poder_${title}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('Imagem salva!');
                }).catch(err => {
                    console.error("Erro", err);
                    showToast('Erro ao gerar.', true);
                });
            }, 300);
        }

        function showToast(msg, autoHide = true) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            if(autoHide) {
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2000);
            }
        }
    </script>
</body>
</html>
